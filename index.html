<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HTML Viewer</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@500;600&display=swap" rel="stylesheet">

    <style>
        /* 全体のリセットとベース設定（ダークモード固定） */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1e1e1e;
            color: #cccccc;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh; 
            height: 100dvh; 
            box-sizing: border-box;
        }

        /* ヘッダー領域 */
        header {
            padding: 12px 16px;
            background-color: #252526;
            border-bottom: 1px solid #333333;
            display: flex;
            align-items: center;
        }

        h1 { 
            font-size: 1.1rem; 
            font-weight: 600;
            margin: 0;
            color: #cccccc;
        }

        /* エディタ領域のラッパー */
        #editor-wrapper {
            flex-grow: 1;
            position: relative;
            min-height: 0; 
            background-color: #272822; 
        }

        /* エディタフォントとスタイルの調整 */
        .CodeMirror {
            height: 100%;
            /* Menloをデフォルトに設定 */
            font-family: 'Menlo', 'Inconsolata', 'Monaco', 'Consolas', monospace;
            font-weight: 500;
            font-size: 15px;
            line-height: 1.6;
            border-bottom: 1px solid #333333;
        }

        /* 行番号の文字色を暗いグレーに変更 */
        .CodeMirror-linenumber {
            color: #666666 !important;
        }

        /* 行番号エリア（ガター）の背景と境界線を調整して固定感を強調 */
        .CodeMirror-gutters {
            background-color: #1e1e1e !important;
            border-right: 1px solid #444444 !important;
        }

        /* フッター（ボタン領域） */
        .controls { 
            padding: 12px 16px;
            background-color: #252526;
            border-top: 1px solid #333333;
            display: flex;
            gap: 10px;
        }

        /* 共通ボタンスタイル */
        button { 
            flex: 1; 
            padding: 14px 20px; 
            cursor: pointer; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-weight: 600;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        .btn-paste {
            background-color: #4d4d4d;
        }
        .btn-paste:hover {
            background-color: #666666;
        }

        .btn-preview {
            background-color: #007acc;
        }
        .btn-preview:hover {
            background-color: #005999;
        }

        /* PC向けのメディアクエリ */
        @media (min-width: 768px) {
            body { padding: 20px; background-color: #121212; }
            header { background-color: transparent; border: none; padding: 0 0 10px 0; }
            h1 { font-size: 1.5rem; }
            #editor-wrapper { border: 1px solid #333333; border-radius: 6px; overflow: hidden; }
            .controls { background-color: transparent; border: none; padding: 15px 0 0 0; justify-content: flex-end; }
            button { flex: none; width: 120px; } 
        }
    </style>
</head>
<body>

    <header>
        <h1>HTML Viewer</h1>
    </header>

    <div id="editor-wrapper">
        <textarea id="code-editor"></textarea>
    </div>

    <div class="controls">
        <button class="btn-paste" onclick="pasteCode()">ペースト</button>
        <button class="btn-preview" onclick="previewHTML()">プレビュー</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>

    <script>
        // エディタの初期化
        const editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
            mode: 'htmlmixed',
            theme: 'monokai',
            lineNumbers: true,
            matchBrackets: true,
            indentUnit: 4,
            placeholder: ""
        });

        // クリップボードからペーストする処理
        async function pasteCode() {
            try {
                const text = await navigator.clipboard.readText();
                editor.setValue(text);
            } catch (err) {
                console.error('ペースト失敗: ', err);
                alert("クリップボードの読み取りが許可されていないか、対応していない環境です。\n手動でペースト (Ctrl+V / Cmd+V または長押し) してください。");
            }
        }

        // プレビュー実行処理
        function previewHTML() {
            const code = editor.getValue();
            if (!code.trim()) {
                alert("コードが入力されていません。");
                return;
            }
            const blob = new Blob([code], { type: 'text/html' });
            const blobUrl = URL.createObjectURL(blob);
            window.open(blobUrl, '_blank');
        }
    </script>
</body>
</html>
