<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HTML Viewer</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">

    <style>
        /* 全体のリセットとベース設定 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1e1e1e;
            /* エディタと境界を馴染ませる暗い背景 */
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            /* スマホ画面の高さをフルに使う */
            height: 100dvh;
            /* モダンブラウザ用: アドレスバーを考慮した高さ */
            box-sizing: border-box;
        }

        /* ヘッダー領域 */
        header {
            padding: 12px 16px;
            background-color: #252526;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0;
            color: #cccccc;
        }

        /* エディタ領域のラッパー */
        #editor-wrapper {
            flex-grow: 1;
            position: relative;
            min-height: 0;
            /* Flexbox内でスクロールさせるためのハック */
        }

        /* CodeMirror本体のスタイル上書き */
        .CodeMirror {
            height: 100%;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        /* フッター（ボタン領域） */
        .controls {
            padding: 12px 16px;
            background-color: #252526;
            border-top: 1px solid #333;
            /* スマホ操作を考慮し、下部に固定 */
        }

        /* プレビューボタン */
        button {
            width: 100%;
            /* スマホで押しやすいように全幅 */
            padding: 14px 20px;
            cursor: pointer;
            background-color: #007acc;
            /* VS Code風のブルー */
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #005999;
        }

        /* PC向けのメディアクエリ（画面幅が768px以上の場合） */
        @media (min-width: 768px) {
            body {
                padding: 20px;
                background-color: #121212;
            }

            header {
                background-color: transparent;
                border: none;
                padding: 0 0 10px 0;
            }

            h1 {
                font-size: 1.5rem;
            }

            #editor-wrapper {
                border: 1px solid #333;
                border-radius: 6px;
                overflow: hidden;
            }

            .controls {
                background-color: transparent;
                border: none;
                padding: 15px 0 0 0;
            }

            button {
                width: auto;
                float: right;
            }

            /* PCでは右下に配置 */
        }
    </style>
</head>

<body>

    <header>
        <h1>HTML Viewer</h1>
    </header>

    <div id="editor-wrapper">
        <textarea id="code-editor"></textarea>
    </div>

    <div class="controls">
        <button onclick="previewHTML()">新しいタブでプレビュー</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>

    <script>
        // CodeMirrorの初期化
        const editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
            mode: 'htmlmixed', // HTMLの中に書かれたCSSやJSも解釈するモード
            theme: 'monokai',  // ダークテーマ
            lineNumbers: true, // 行番号の表示
            matchBrackets: true,
            indentUnit: 4,
            placeholder: ""
        });

        // プレビュー実行関数
        function previewHTML() {
            // CodeMirrorから値を取得
            const code = editor.getValue();

            if (!code.trim()) {
                alert("コードが入力されていません。");
                return;
            }

            const blob = new Blob([code], { type: 'text/html' });
            const blobUrl = URL.createObjectURL(blob);
            window.open(blobUrl, '_blank');
        }
    </script>
</body>

</html>
