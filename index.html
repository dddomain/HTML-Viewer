<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HTML Viewer</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@500;600&display=swap" rel="stylesheet">

    <style>
        /* テーマごとのカラーパレット定義（エディタ部分は常にダーク） */
        :root {
            /* ライトモード */
            --bg-color: #f8f9fa;
            --text-color: #333333;
            --header-bg: #ffffff;
            --border-color: #cccccc;
            --btn-bg: #0d6efd;
            --btn-hover: #0b5ed7;
            --btn-paste-bg: #6c757d;
            --btn-paste-hover: #5c636a;
            --select-bg: #ffffff;
            --select-text: #333333;
        }

        [data-theme="dark"] {
            /* ダークモード */
            --bg-color: #1e1e1e;
            --text-color: #cccccc;
            --header-bg: #252526;
            --border-color: #333333;
            --btn-bg: #007acc;
            --btn-hover: #005999;
            --btn-paste-bg: #4d4d4d;
            --btn-paste-hover: #666666;
            --select-bg: #3c3c3c;
            --select-text: #cccccc;
        }

        /* 全体のリセットとベース設定 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh; 
            height: 100dvh; 
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        /* ヘッダー領域 */
        header {
            padding: 12px 16px;
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.3s, border-color 0.3s;
        }

        h1 { 
            font-size: 1.1rem; 
            font-weight: 600;
            margin: 0;
            color: var(--text-color);
        }

        /* テーマセレクター */
        select#theme-selector {
            padding: 6px 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: var(--select-bg);
            color: var(--select-text);
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
        }

        /* エディタ領域のラッパー */
        #editor-wrapper {
            flex-grow: 1;
            position: relative;
            min-height: 0; 
            /* エディタ周辺の背景を暗く統一 */
            background-color: #272822; 
        }

        /* エディタフォントとスタイルの調整 */
        .CodeMirror {
            height: 100%;
            /* InconsolataとMenloを指定し、少し太字(500)に */
            font-family: 'Inconsolata', 'Menlo', 'Monaco', 'Consolas', monospace;
            font-weight: 500;
            font-size: 15px;
            line-height: 1.6;
            border-bottom: 1px solid var(--border-color);
        }

        /* フッター（ボタン領域） */
        .controls { 
            padding: 12px 16px;
            background-color: var(--header-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px; /* ボタン間の余白 */
            transition: background-color 0.3s, border-color 0.3s;
        }

        /* 共通ボタンスタイル */
        button { 
            flex: 1; /* スマホでは均等に2分割 */
            padding: 14px 20px; 
            cursor: pointer; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-weight: 600;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        .btn-paste {
            background-color: var(--btn-paste-bg);
        }
        .btn-paste:hover {
            background-color: var(--btn-paste-hover);
        }

        .btn-preview {
            background-color: var(--btn-bg);
        }
        .btn-preview:hover {
            background-color: var(--btn-hover);
        }

        /* PC向けのメディアクエリ */
        @media (min-width: 768px) {
            body { padding: 20px; background-color: var(--bg-color); }
            header { background-color: transparent; border: none; padding: 0 0 10px 0; }
            h1 { font-size: 1.5rem; }
            #editor-wrapper { border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; }
            .controls { background-color: transparent; border: none; padding: 15px 0 0 0; justify-content: flex-end; }
            button { flex: none; width: auto; } /* PCでは内容に合わせた幅に */
        }
    </style>
</head>
<body>

    <header>
        <h1>HTML Viewer</h1>
        <select id="theme-selector" onchange="handleThemeChange(this.value)">
            <option value="system">デフォルトモード</option>
            <option value="light">ライトモード</option>
            <option value="dark">ダークモード</option>
        </select>
    </header>

    <div id="editor-wrapper">
        <textarea id="code-editor"></textarea>
    </div>

    <div class="controls">
        <button class="btn-paste" onclick="pasteCode()">ペーストして上書き</button>
        <button class="btn-preview" onclick="previewHTML()">新しいタブでプレビュー</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>

    <script>
        // エディタの初期化（常にMonokaiテーマを使用）
        const editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
            mode: 'htmlmixed',
            theme: 'monokai',
            lineNumbers: true,
            matchBrackets: true,
            indentUnit: 4,
            placeholder: ""
        });

        // テーマ管理のロジック
        const themeSelector = document.getElementById('theme-selector');
        const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

        function applyTheme(theme) {
            let isDark = false;
            if (theme === 'system') {
                isDark = mediaQuery.matches;
            } else {
                isDark = (theme === 'dark');
            }
            // UI全体のテーマを切り替え（エディタ部分は常にダークで固定）
            if (isDark) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
        }

        function handleThemeChange(value) {
            localStorage.setItem('htmlViewerTheme', value);
            applyTheme(value);
        }

        mediaQuery.addEventListener('change', () => {
            if (themeSelector.value === 'system') {
                applyTheme('system');
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('htmlViewerTheme') || 'system';
            themeSelector.value = savedTheme;
            applyTheme(savedTheme);
        });

        // クリップボードからペーストする処理
        async function pasteCode() {
            try {
                // クリップボードのテキストを読み込み
                const text = await navigator.clipboard.readText();
                // エディタの内容を上書き
                editor.setValue(text);
            } catch (err) {
                console.error('ペースト失敗: ', err);
                alert("クリップボードの読み取りが許可されていないか、対応していない環境です。\n手動でペースト (Ctrl+V / Cmd+V または長押し) してください。");
            }
        }

        // プレビュー実行処理
        function previewHTML() {
            const code = editor.getValue();
            if (!code.trim()) {
                alert("コードが入力されていません。");
                return;
            }
            const blob = new Blob([code], { type: 'text/html' });
            const blobUrl = URL.createObjectURL(blob);
            window.open(blobUrl, '_blank');
        }
    </script>
</body>
</html>
