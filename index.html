<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HTML Viewer</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">

    <style>
        /* テーマごとのカラーパレット定義 */
        :root {
            /* ライトモード（デフォルト） */
            --bg-color: #f8f9fa;
            --text-color: #333333;
            --header-bg: #ffffff;
            --border-color: #cccccc;
            --btn-bg: #0d6efd;
            --btn-hover: #0b5ed7;
            --select-bg: #ffffff;
            --select-text: #333333;
        }

        [data-theme="dark"] {
            /* ダークモード */
            --bg-color: #1e1e1e;
            --text-color: #cccccc;
            --header-bg: #252526;
            --border-color: #333333;
            --btn-bg: #007acc;
            --btn-hover: #005999;
            --select-bg: #3c3c3c;
            --select-text: #cccccc;
        }

        /* 全体のリセットとベース設定 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh; 
            height: 100dvh; 
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        /* ヘッダー領域 */
        header {
            padding: 12px 16px;
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.3s, border-color 0.3s;
        }

        h1 { 
            font-size: 1.1rem; 
            font-weight: 600;
            margin: 0;
            color: var(--text-color);
        }

        /* テーマセレクター */
        select#theme-selector {
            padding: 6px 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: var(--select-bg);
            color: var(--select-text);
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
        }

        /* エディタ領域のラッパー */
        #editor-wrapper {
            flex-grow: 1;
            position: relative;
            min-height: 0; 
        }

        .CodeMirror {
            height: 100%;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            /* ライトモード時のデフォルトボーダー（ダーク時はMonokai側で吸収） */
            border-bottom: 1px solid var(--border-color);
        }

        /* フッター（ボタン領域） */
        .controls { 
            padding: 12px 16px;
            background-color: var(--header-bg);
            border-top: 1px solid var(--border-color);
            transition: background-color 0.3s, border-color 0.3s;
        }

        /* プレビューボタン */
        button { 
            width: 100%; 
            padding: 14px 20px; 
            cursor: pointer; 
            background-color: var(--btn-bg);
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-weight: 600;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        button:hover { 
            background-color: var(--btn-hover); 
        }

        /* PC向けのメディアクエリ */
        @media (min-width: 768px) {
            body { padding: 20px; background-color: var(--bg-color); }
            header { background-color: transparent; border: none; padding: 0 0 10px 0; }
            h1 { font-size: 1.5rem; }
            #editor-wrapper { border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; }
            .controls { background-color: transparent; border: none; padding: 15px 0 0 0; }
            button { width: auto; float: right; } 
        }
    </style>
</head>
<body>

    <header>
        <h1>HTML Viewer</h1>
        <select id="theme-selector" onchange="handleThemeChange(this.value)">
            <option value="system">システム設定に従う</option>
            <option value="light">ライトモード</option>
            <option value="dark">ダークモード</option>
        </select>
    </header>

    <div id="editor-wrapper">
        <textarea id="code-editor"></textarea>
    </div>

    <div class="controls">
        <button onclick="previewHTML()">新しいタブでプレビュー</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>

    <script>
        // エディタの初期化
        const editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
            mode: 'htmlmixed',
            lineNumbers: true,
            matchBrackets: true,
            indentUnit: 4,
            placeholder: ""
        });

        // テーマ管理のロジック
        const themeSelector = document.getElementById('theme-selector');
        const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

        function applyTheme(theme) {
            let isDark = false;

            if (theme === 'system') {
                isDark = mediaQuery.matches;
            } else {
                isDark = (theme === 'dark');
            }

            // UI全体のテーマを切り替え
            if (isDark) {
                document.documentElement.setAttribute('data-theme', 'dark');
                editor.setOption('theme', 'monokai');
            } else {
                document.documentElement.removeAttribute('data-theme');
                editor.setOption('theme', 'default');
            }
        }

        function handleThemeChange(value) {
            localStorage.setItem('htmlViewerTheme', value);
            applyTheme(value);
        }

        // OSのテーマ設定が変更されたときのイベントリスナー
        mediaQuery.addEventListener('change', () => {
            if (themeSelector.value === 'system') {
                applyTheme('system');
            }
        });

        // ページ読み込み時の初期化処理
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('htmlViewerTheme') || 'system';
            themeSelector.value = savedTheme;
            applyTheme(savedTheme);
        });

        // プレビュー実行関数
        function previewHTML() {
            const code = editor.getValue();
            
            if (!code.trim()) {
                alert("コードが入力されていません。");
                return;
            }

            const blob = new Blob([code], { type: 'text/html' });
            const blobUrl = URL.createObjectURL(blob);
            window.open(blobUrl, '_blank');
        }
    </script>
</body>
</html>
